<!-- WEBSOCKET -->
<script>
let socket;

function initWebSocket() {
    socket = new WebSocket("wss://sahraba-multiplayer.onrender.com/");

    socket.addEventListener("open", () => {
        console.log("WS bağlandı");

        socket.send(JSON.stringify({
            type: "join",
            room: window.roomName,
            player: window.player1Name
        }));
    });

    socket.addEventListener("message", (event) => {
        const data = JSON.parse(event.data);
        console.log("WS mesaj:", data);

        if (data.type === "start") {
            window.player1Name = data.player1;
            window.player2Name = data.player2;

            if (s_oInterface && s_oInterface.setPlayersInfo) {
                s_oInterface.setPlayersInfo(window.player1Name, window.player2Name);
            }
        }

        if (data.type === "move") {
            if (s_oGame && s_oGame.remoteMove) {
                s_oGame.remoteMove(data.move.from, data.move.to);
            }
        }
    });

    socket.addEventListener("close", () => console.log("WS kapandı"));
    socket.addEventListener("error", (err) => console.log("WS hata:", err));
}
</script>

<body ondragstart="return false;" ondrop="return false;">

<canvas id="canvas" width="1360" height="840"></canvas>

<script>
document.addEventListener("DOMContentLoaded", () => {

    // OYUNU BAŞLAT
    const oMain = new CMain({
        fullscreen: true,
        audio_enable_on_startup: false,
        check_orientation: true
    });

    // Oyun hazır olduğunda WebSocket'i başlat
    document.addEventListener("game_ready", () => {
        console.log("Oyun hazır → WebSocket başlatılıyor");
        initWebSocket();

        if (s_oInterface && s_oInterface.setPlayersInfo) {
            s_oInterface.setPlayersInfo(window.player1Name, window.player2Name);
        }
    });

    sizeHandler();
});
</script>
