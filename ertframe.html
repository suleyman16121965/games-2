<body>
  <!-- Sol sohbet paneli -->
  <div id="chatPanel">
    <h3>Sohbet</h3>
    <div id="playerInfo"></div>
    <div id="chatMessages"></div>
    <input type="text" id="chatInput" placeholder="Mesaj yaz...">
    <button onclick="sendChat()">Gönder</button>
    <button class="exitBtn" onclick="exitGame()">Oyunu Kapat</button>
  </div>

  <!-- Oyun sahnesi -->
  <iframe id="gameFrame"></iframe>
<script>
const roomRef = firebase.database().ref("rooms/" + room + "/players");

roomRef.once("value").then(snapshot => {
    const players = snapshot.val() || {};

    const p1 = players.player1?.username || null;
    const p2 = players.player2?.username || null;

    if (!p1) {
        joinAsPlayer1();
        return;
    }

    if (p1 && !p2) {
        const message = `Player 2 is empty.\nWould you like to play with ${p1}?`;

        if (confirm(message)) {
            joinAsPlayer2();
        } else {
            alert("You chose not to join this room.");
        }
        return;
    }

    if (p1 && p2) {
        alert("Room is full.");
        return;
    }
});
    function joinAsPlayer1() {
    firebase.database()
        .ref("rooms/" + room + "/players/player1")
        .set({
            username: username,
            city: city
        });

    // ⭐ Player1’i listeye ekle
    playersRef.push({
        user: username,
        city: city,
        joinedAt: Date.now()
    });
}

function joinAsPlayer2() {
    firebase.database()
        .ref("rooms/" + room + "/players/player2")
        .set({
            username: username,
            city: city
        });

    // ⭐ Player2’yi listeye ekle
    playersRef.push({
        user: username,
        city: city,
        joinedAt: Date.now()
    });
}

</script>
  <script>
    // URL parametrelerini oku
    const urlParams = new URLSearchParams(window.location.search);
    const username = urlParams.get("username") || "Unknown";
    const city = urlParams.get("city") || "Unknown";
    const room = urlParams.get("room") || "default";

    // Firebase path'leri
    const chatRef = firebase.database().ref("rooms/" + room + "/chat");
    const playersRef = firebase.database().ref("rooms/" + room + "/players");


    let playerKey = null;

    window.addEventListener("DOMContentLoaded", () => {
      // Oyuncu kaydı
      playerKey = playersRef.push({
        user: username,
        city: city,
        joinedAt: Date.now()
      }).key;
      playersRef.child(playerKey).onDisconnect().remove();

      // Oyuncu listesi dinle
      playersRef.on("value", snapshot => {
        const players = snapshot.val();
        let list = `Oda: ${room}\nOyuncular:\n`;
        if (players) {
          for (let key in players) {
            list += `- ${players[key].user} (${players[key].city})\n`;
          }
        } else {
          list += "Şu anda kimse yok.";
        }
        document.getElementById("playerInfo").innerText = list;
      });

      // Sohbet mesajlarını dinle
      const chatBox = document.getElementById("chatMessages");
      chatRef.on("child_added", snapshot => {
        const data = snapshot.val();
        const newMsg = document.createElement("div");
        newMsg.innerHTML = `<strong>${data.user}:</strong> ${data.message}`;
        chatBox.appendChild(newMsg);
        chatBox.scrollTop = chatBox.scrollHeight;
      });

      // Oyun iframe’ini parametrelerle aç
      document.getElementById("gameFrame").src =
  "https://sahraba.com/backgammon/index.html"
  + "?player1=" + encodeURIComponent(username)
  + "&player2=Waiting"
  + "&room=" + encodeURIComponent(room);
    });

    // Mesaj gönder
    function sendChat() {
      const input = document.getElementById("chatInput");
      const msg = input.value;
      if (msg.trim() === "") return;

      chatRef.push({
        user: `${username} (${city})`,
        message: msg,
        timestamp: Date.now()
      });

      input.value = "";
    }

    // Oyunu kapat
    function exitGame() {
      document.getElementById("gameFrame").src = "https://sahraba.com/games/";
      if (playersRef && playerKey) {
        playersRef.child(playerKey).remove();
      }
    }
  </script>
  
</body>
