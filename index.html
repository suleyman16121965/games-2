  <!-- WebSocket -->
  <script>
    const socket = new WebSocket("wss://sahraba-multiplayer.onrender.com/");

    socket.addEventListener("open", () => {
      console.log("WebSocket bağlandı");

      socket.send(JSON.stringify({
        type: "join",
        room: window.roomName,
        player: window.player1Name || window.player2Name
      }));
    });

    socket.addEventListener("message", (event) => {
      const data = JSON.parse(event.data);

      // MOVE
      if (data.type === "move" && s_oGame?.remoteMove) {
        s_oGame.remoteMove(data.move.from, data.move.to);
      }

      // START → isimleri güncelle
      if (data.type === "start") {
        window.player1Name = data.player1;
        window.player2Name = data.player2;

        if (s_oInterface?.setPlayersInfo) {
          s_oInterface.setPlayersInfo(window.player1Name, window.player2Name);
        }

        if (typeof updateChatNames === "function") {
          updateChatNames(window.player1Name, window.player2Name);
        }
      }
    });
  </script>
